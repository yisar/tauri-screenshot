<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Preview</title>
    <script src="https://unpkg.com/dom-to-image-more"></script>


    <style>
        html,
        body {
            -webkit-app-region: drag;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        #container {}
    </style>
</head>

<body data-tauri-drag-region>

    <div id="container" data-tauri-drag-region></div>


    <script>
        const container = document.getElementById("container");

        // sleep 工具（纯 JS）
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        window.__UPDATE_PREVIEW__ = async (p) => {
            container.innerHTML = p.html;
        };

    </script>

</body>

</html>
