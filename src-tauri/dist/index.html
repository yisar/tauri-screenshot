<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Editor</title>
</head>

<style>
    body {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 10px;
        padding: 0;
        margin: 0;
    }

    textarea {
        font-size: 16px;
        border: none;
        outline: none;
    }

    .panel {
        position: fixed;
        right: 0px;
        bottom: 0px;
        width: 100%;
        background: #f2f2f2;
        display: flex;
        justify-content: right;
        padding: 5px;
    }

    input {
        border: none;
        width: 50px;
        text-align: center;
        color: #333;
    }
    input:nth-child(1){
        border-radius: 5px 0 0 5px;
        border-right: 1px solid #ddd;
    }

    button {
        color: #fff;
        background: #333;
        border: none;
        border-radius: 0 5px 5px 0;
    }
</style>

<body>

    <textarea id="html" style="width:100%;height:100%;" spellcheck="false" placeholder="请输入 HTML 代码"></textarea>

    <div class="panel">
        <input id="w" type="number" value="600">
        <input id="h" type="number" value="400">

        <button id="btn">发射</button>
    </div>


    <script>
        const html = document.getElementById('html');
        const w = document.getElementById('w');
        const h = document.getElementById('h');
        const statusEl = document.getElementById('status');

        function status(msg) {
            statusEl.innerText = msg;
        }

        async function invokeUpdate(payload) {
            try {
                if (window.__TAURI__?.core?.invoke) {
                    await window.__TAURI__.core.invoke('update_preview', payload);
                } else if (window.__TAURI_INTERNALS__?.invoke) {
                    await window.__TAURI_INTERNALS__.invoke('update_preview', payload);
                } else {
                    throw new Error("No Tauri API found");
                }

                status("sent ✔");
            } catch (e) {
                console.error(e);
                status("invoke failed ❌");
            }
        }

        document.getElementById('btn').onclick = () => {
            invokeUpdate({
                payload: {
                    html: html.value,
                    width: Number(w.value),
                    height: Number(h.value)
                }

            });
        };
    </script>

</body>

</html>
