<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Editor</title>
</head>

<style>
    body {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 10px;
        padding: 0;
        margin: 0;
    }

    textarea {
        font-size: 16px;
        border: none;
        outline: none;
        padding: 8px 10px;
        font-size: 16px;
        line-height: 16px;
        background-image: linear-gradient(#e0e0e0 1px, transparent 1px);
        background-size: 100% 30px;
        background-repeat: repeat-y;
        margin-top: 32px;
    }

    .panel {

        display: flex;
        justify-content: right;
        padding: 5px;
    }

    input {
        border: none;
        width: 50px;
        text-align: center;
        color: #333;
    }

    input:nth-child(1) {
        border-radius: 5px 0 0 5px;
        border-right: 1px solid #ddd;
    }

    #btn,
    #btn2 {
        color: #fff;
        background: #333;
        border: none;
    }

    #btn2 {
        border-radius: 0 5px 5px 0;
        border-left: 1px solid #000;
    }

    section {
        position: fixed;
        right: 0px;
        top: 0px;
        width: 100%;
        background: #f2f2f2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        -webkit-app-region: drag;

    }

    #close,
    #close2 {
        height: 15px;
        width: 15px;
        border-radius: 50%;
        background: #ed4242;
        border: none;
        font-size: 0;
        cursor: pointer;
        margin: 5px;
    }

    #close2 {
        background: #ffd642;
    }
</style>

<body>

    <textarea id="html" style="width:100%;height:100%;" spellcheck="false" placeholder="请输入 HTML 代码"></textarea>

    <section>

        <div class="left">
            <button id="close"></button>
            <button id="close2"></button>
        </div>
        <div class="panel">
            <input id="w" type="number" value="600">
            <input id="h" type="number" value="400">

            <button id="btn">预览</button>
            <button id="btn2">截图</button>
        </div>
    </section>


    <script>
        const html = document.getElementById('html');
        const w = document.getElementById('w');
        const h = document.getElementById('h');
        const statusEl = document.getElementById('status');

        function status(msg) {
            statusEl.innerText = msg;
        }

        async function invokeUpdate(payload) {
            try {
                if (window.__TAURI__?.core?.invoke) {
                    await window.__TAURI__.core.invoke('update_preview', payload);
                } else if (window.__TAURI_INTERNALS__?.invoke) {
                    await window.__TAURI_INTERNALS__.invoke('update_preview', payload);
                } else {
                    throw new Error("No Tauri API found");
                }

                status("sent ✔");
            } catch (e) {
                console.error(e);
                status("invoke failed ❌");
            }
        }

        async function invokeScreenShot(payload) {
            try {
                if (window.__TAURI__?.core?.invoke) {
                    await window.__TAURI__.core.invoke('update_screenshot', payload);
                } else if (window.__TAURI_INTERNALS__?.invoke) {
                    await window.__TAURI_INTERNALS__.invoke('update_screenshot', payload);
                } else {
                    throw new Error("No Tauri API found");
                }

                status("sent ✔");
            } catch (e) {
                console.error(e);
                status("invoke failed ❌");
            }
        }

        document.getElementById('btn').onclick = () => {
            invokeUpdate({
                payload: {
                    html: html.value,
                    width: Number(w.value),
                    height: Number(h.value)
                }

            });
        };

        document.getElementById('btn2').onclick = () => {
            invokeScreenShot({
                payload: {
                    html: html.value,
                    width: Number(w.value),
                    height: Number(h.value)
                }

            });
        };

        const win = window.__TAURI__.window.getCurrentWindow();

        document.getElementById("close").onclick = () => {
            win.close();
        };



        document.getElementById("close2").onclick = async () => {
            const windows = await window.__TAURI__.window.getAllWindows()


            // 找到 preview 窗口
            const preview = windows.find(w => w.label === "preview");
            if (preview) {
                preview.close();
            }
        };
    </script>

</body>

</html>
